spidertron-enhancements-enter-entity-all=Wszystkie
spidertron-enhancements-spiderton-requires-fuel-Default=Domyślny

[mod-setting-description]
spidertron-enhancements-spiderton-requires-fuel=Ustawienie domyślne oznacza, że opcja ta nie zostanie zmieniona względem wartości z podstawowej wersji gry lub innych modów.
spidertron-enhancements-sound-pause=Średnia liczba sekund, po których dźwięk Spidertrona zostanie ponownie odtworzony (sam dźwięk trwa 19 s).

spidertron-enhancements-enter-entity=Skonfiguruj sterowanie w zakładce ustawień [font=default-bold]Dla gracza[/font].

spidertron-enhancements-enter-entity-base-game=Nadpisuje domyślne zachowanie klawisza __CONTROL__toggle-driving__, gdy prowadzisz Spidertrona w pobliżu innego pojazdu.\nZależy od ustawienia [font=default-bold]Mapy[/font]: „Wchodzenie/wychodzenie z pojazdów ze Spidertrona”.
spidertron-enhancements-enter-entity-custom=Zależy od ustawienia [font=default-bold]Mapy[/font]: „Wchodzenie/wychodzenie z pojazdów ze Spidertrona”.
spidertron-enhancements-pipette-unconnected-remote=Zależy od ustawienia [font=default-bold]Mapy[/font]: „Pipeta Spidertrona wybiera tymczasowy pilot zamiast tego z ekwipunku”.


