instruction-to-queue-spidertron-order=__1__, aby zakolejkować rozkaz ruchu.\n•   __ALT_CONTROL__1__spidertron-enhancements-use-alt-spidertron-remote__, aby wysłać Spidertrona z wyznaczaniem ścieżek.\n•   __CONTROL__spidertron-enhancements-open-in-map__, aby pokazać go na mapie.\n•   __CONTROL__spidertron-enhancements-open-vehicle-inventory__, aby otworzyć ekwipunek Spidertrona.

[tips-and-tricks-item-name]
spidertron-enhancements=Ulepszenia Spidertrona
spidertron-enhancements-enter-train=Wchodzenie do pojazdów ze Spidertrona
spidertron-enhancements-quick-toggle=Szybkie przywołanie lub chowanie Spidertrona
spidertron-enhancements-pathfinder=Wyznaczanie ścieżek pilotem
spidertron-enhancements-remote-pipette=Narzędzie pipety pilota Spidertrona

[tips-and-tricks-item-description]
spidertron-enhancements=Przegląd głównych funkcji dodanych przez mod [font=default-bold]Spidertron Enhancements[/font]. Pełną listę znajdziesz w ustawieniach lub na portalu z modami.
spidertron-enhancements-enter-train=Naciśnij __CONTROL__toggle-driving__ i/lub __CONTROL__spidertron-enhancements-enter-vehicles__ (zależnie od ustawień), będąc w pobliżu pojazdu, aby do niego wejść.
spidertron-enhancements-quick-toggle=Naciśnij __ALT_CONTROL__1__spidertron-enhancements-enter-vehicles__, aby szybko przywołać lub schować Spidertrona.
spidertron-enhancements-pathfinder=Naciśnij __ALT_CONTROL__1__spidertron-enhancements-use-alt-spidertron-remote__ trzymając [item=spidertron-remote], aby Spidertron automatycznie omijał wodę.
spidertron-enhancements-remote-pipette=Naciśnij __ALT_CONTROL__1__spidertron-enhancements-spidertron-pipette__, trzymając kursor nad Spidertronem, aby wybrać przypisanego do niego [item=spidertron-remote].


