[controls]
spidertron-enhancements-use-alt-spidertron-remote=Wydaj rozkaz Spidertronowi do wyznaczania ścieżek
spidertron-enhancements-enter-vehicles=Przywołaj/ukryj Spidertrona
spidertron-enhancements-spidertron-pipette=Narzędzie pipety Spidertrona
spidertron-enhancements-spidertron-patrol-pipette=Narzędzie pipety patrolu Spidertrona
spidertron-enhancements-open-vehicle-inventory=Otwórz interfejs pojazdu
spidertron-enhancements-open-in-map=Pokaż Spidertrona na mapie
spidertron-enhancements-recall-shortcut=Przywołaj ostatnio używanego Spidertrona

[controls-description]
spidertron-enhancements-use-alt-spidertron-remote=Używane z pilotem Spidertrona do wydawania rozkazów podłączonemu Spidertronowi przy użyciu systemu wyznaczania ścieżek.
spidertron-enhancements-enter-vehicles=Efekt zależy od tego, czy jesteś wewnątrz lub w pobliżu pojazdu i może zostać skonfigurowany w ustawieniach.\n[color=red]Nie przypisuj tego samego klawisza, co dla podstawowego sterowania [font=default-bold]Wejścia/wyjścia z pojazdu[/font] (__CONTROL__toggle-driving__)[/color].
spidertron-enhancements-spidertron-pipette=Wybiera z ekwipunku pilota połączonego z aktualnie zaznaczonym Spidertronem i umieszcza go na kursorze.\nJeśli nie wybrano żadnego Spidertrona, wybiera pilota połączonego z tym, którego aktualnie prowadzisz.
spidertron-enhancements-spidertron-patrol-pipette=Działa tylko, gdy zainstalowany jest mod Spidertron Patrols.\nWybiera pilota patrolowego połączonego z aktualnie zaznaczonym Spidertronem i umieszcza go na kursorze.\nJeśli nie wybrano żadnego Spidertrona, wybiera pilota patrolowego połączonego z tym, którego aktualnie prowadzisz.
spidertron-enhancements-open-vehicle-inventory=Jeśli trzymasz pilota Spidertrona, otwiera ekwipunek połączonego Spidertrona.\nW przeciwnym razie otwiera ekwipunek pojazdu, który aktualnie prowadzisz.

[shortcut-name]
spidertron-enhancements-make-spidertron-remote=Stwórz pilota dla: __1__
spidertron-enhancements-recall-shortcut=Przywołaj ostatnio używanego: __1__

[mod-setting-name]
spidertron-enhancements-enable-corpse=Zapisuj ekwipunek we wraku po zniszczeniu Spidertrona
spidertron-enhancements-spiderton-requires-fuel=Spidertron wymaga paliwa
spidertron-enhancements-increase-size=Zwiększ rozmiar Spidertrona
spidertron-enhancements-sound-pause=Średnia pauza dźwięku Spidertrona
spidertron-enhancements-volume-scale=Skala głośności dźwięku Spidertrona

spidertron-enhancements-enter-entity=Wchodzenie/wychodzenie z pojazdów Spidertronem za pomocą __CONTROL__toggle-driving__ lub __CONTROL__spidertron-enhancements-enter-vehicles__
spidertron-enhancements-show-spider-on-vehicle=Pokazuj Spidertrona na wierzchu pojazdu po wejściu do niego ze Spidertrona
spidertron-enhancements-enter-player=Szybkie przywołanie lub ukrycie Spidertrona za pomocą __CONTROL__spidertron-enhancements-enter-vehicles__

spidertron-enhancements-enter-entity-base-game=Wchodzenie/wychodzenie ze Spidertrona standardowym klawiszem __CONTROL__toggle-driving__
spidertron-enhancements-enter-entity-custom=Wchodzenie/wychodzenie ze Spidertrona niestandardowym klawiszem __CONTROL__spidertron-enhancements-enter-vehicles__

